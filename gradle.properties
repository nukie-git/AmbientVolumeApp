# Project-wide Gradle settings.

# Specifies the JVM arguments used for the daemon process.
# Increased memory to 4GB to handle R8 optimization and Compose compilation.
org.gradle.jvmargs=-Xmx4096m -XX:-HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# When configured, Gradle will run in parallel mode.
org.gradle.parallel=true

# AndroidX and Jetifier support
android.useAndroidX=true
android.enableJetifier=false

# Kotlin incremental compilation
kotlin.incremental=true

# Enable Build Cache for faster consecutive builds
org.gradle.caching=true

# Enable Configuration Cache to skip the configuration phase
org.gradle.configuration-cache=true

# Use high-performance JVM settings
org.gradle.vfs.watch=true
android.nonTransitiveRClass=true

# Use Android Studio's bundled JDK 21 to run the build (Required by AGP 8.x)
org.gradle.java.home=C\:\\Program Files\\Android\\Android Studio\\jbr
